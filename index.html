<script>
// ═══════════════════════════════════════════════════════════
// §1  CONFIGURATION & STATE
// ═══════════════════════════════════════════════════════════
const API='https://football-ai-backend.ephesians2004.workers.dev';
const DB_NAME='predictpro_db';const DB_VER=1;
const TTL={FIX:24*36e5,DET:24*36e5,ODDS:2*36e5,PAST:7*24*36e5};
let curDate=new Date(),curCat='DAILY_5PLUS',bundle=null,predC={};
const MEM={bundles:new Map(),details:new Map()};
const INFLIGHT=new Map();
let lastPrefetchDate=null;

// ═══════════════════════════════════════════════════════════
// §2  LOGGING
// ═══════════════════════════════════════════════════════════
const LOG={
  _el:null,_get(){return this._el||(this._el=document.getElementById('logBar'))},
  log(t,m){const s=`[${t}] ${m}`;console.log(s);const e=this._get();if(e)e.textContent=s},
  mem(m){this.log('MEM HIT',m)},disk(m){this.log('CACHE HIT',m)},
  net(m){this.log('NETWORK',m)},stale(m){this.log('STALE FALLBACK',m)},
  bundle(m){this.log('BUNDLE',m)},info(m){this.log('INFO',m)}
};

// ═══════════════════════════════════════════════════════════
// §3  3-LAYER CACHE
// ═══════════════════════════════════════════════════════════
const Cache={
  db:null,
  async init(){return new Promise(ok=>{const r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv')};r.onsuccess=e=>{Cache.db=e.target.result;ok()};r.onerror=()=>ok()})},
  memGet(k){const e=MEM.bundles.get(k)||MEM.details.get(k);if(!e)return null;if(Date.now()-e.ts>e.ttl){MEM.bundles.delete(k);MEM.details.delete(k);return null}return e.data},
  memSet(k,d,t,s='bundles'){MEM[s].set(k,{data:d,ts:Date.now(),ttl:t})},
  async diskGet(k){if(!this.db)return null;return new Promise(ok=>{try{const tx=this.db.transaction('kv','readonly');const rq=tx.objectStore('kv').get(k);rq.onsuccess=()=>{const e=rq.result;ok(e&&Date.now()-e.ts<=e.ttl?e.data:null)};rq.onerror=()=>ok(null)}catch(e){ok(null)}})},
  async diskSet(k,d,t){if(!this.db)return;try{this.db.transaction('kv','readwrite').objectStore('kv').put({data:d,ts:Date.now(),ttl:t},k)}catch(e){}},
  async diskGetStale(k){if(!this.db)return null;return new Promise(ok=>{try{const tx=this.db.transaction('kv','readonly');const rq=tx.objectStore('kv').get(k);rq.onsuccess=()=>{const e=rq.result;ok(e?e.data:null)};rq.onerror=()=>ok(null)}catch(e){ok(null)}})},
  async netFetch(u){if(INFLIGHT.has(u)){LOG.info('Dedup: '+u.split('?')[0].split('/').pop());return INFLIGHT.get(u)}const p=fetch(u,{signal:AbortSignal.timeout(20000)}).then(r=>{if(!r.ok)throw new Error(r.status);return r.json()}).finally(()=>INFLIGHT.delete(u));INFLIGHT.set(u,p);return p},
  async get(k,t,u){const m=this.memGet(k);if(m){LOG.mem(k);return m}const d=await this.diskGet(k);if(d){LOG.disk(k);this.memSet(k,d,t);return d}if(u){try{const n=await this.netFetch(u);LOG.net(k);this.memSet(k,n,t);await this.diskSet(k,n,t);return n}catch(e){LOG.stale(k+' net:'+e.message)}}const s=await this.diskGetStale(k);if(s){LOG.stale(k);this.memSet(k,s,t);return s}return null},
  reset(){MEM.bundles.clear();MEM.details.clear();lastPrefetchDate=null;predC={};LOG.info('All caches reset')}
};

// ═══════════════════════════════════════════════════════════
// §4  DATA MANAGER
// ═══════════════════════════════════════════════════════════
function fmtD(d){return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')}
function isPast(d){const t=new Date();t.setHours(0,0,0,0);const c=new Date(d);c.setHours(0,0,0,0);return c<t}

function parseBundle(raw){
  if(!raw)return null;
  if(raw.status==='error')return null;
  let matches=raw.response?.matches||raw.matches||raw.data?.matches||raw.data?.fixtures||raw.fixtures||[];
  if(!Array.isArray(matches))matches=[];
  const details={};
  for(const m of matches){
    const id=m.id||m.fixture?.id||('m'+Math.random().toString(36).slice(2));
    m.id=id;
    const h2h=m.cachedH2H||m.h2h||m.head2head||null;
    const stats=m.cachedStats||m.stats||m.teamStats||null;
    const odds=m.cachedOdds||m.odds||(stats?.odds?{response:{odds:stats.odds}}:null)||null;
    details[id]={h2h,stats,odds};
  }
  const meta=raw.meta||{totalMatches:matches.length,statsLoaded:Object.values(details).filter(d=>d.stats).length,readiness:100};
  LOG.bundle(`PARSED: ${matches.length} matches, ${meta.statsLoaded} with stats`);
  return{matches,details,meta};
}

async function loadBundle(date,force){
  const ds=fmtD(date),key='bundle:'+ds,ttl=isPast(date)?TTL.PAST:TTL.FIX;
  if(!force&&lastPrefetchDate===ds){const m=Cache.memGet(key);if(m){LOG.mem('prefetch-guard:'+ds);return parseBundle(m)}}
  const url=`${API}/v2/bundle?date=${ds}`;
  if(force){try{const f=await Cache.netFetch(url);LOG.net('forced:'+ds);Cache.memSet(key,f,ttl);await Cache.diskSet(key,f,ttl);lastPrefetchDate=ds;return parseBundle(f)}catch(e){LOG.stale('force failed');}}
  const raw=await Cache.get(key,ttl,url);lastPrefetchDate=ds;return parseBundle(raw);
}

// ═══════════════════════════════════════════════════════════
// §5  POISSON ENGINE  (Fix A — complete)
// ═══════════════════════════════════════════════════════════
function clamp(v,lo,hi){return Math.min(Math.max(v,lo),hi)}
function hc(s){let h=0;for(let i=0;i<(s||'').length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return h}
function sRand(seed){let s=seed|0;return()=>{s=(s*1664525+1013904223)|0;return(s>>>0)/4294967296}}
function noise(seed,id,range){const r=sRand((seed+hc(id))^0xDEADBEEF);return Math.floor(r()*(range*2+1))-range}
function fmt1(v){return v.toFixed(1)}

const Po={
  pmf(k,l){if(l<=0)return k===0?1:0;if(k<0)return 0;let f=0;for(let i=2;i<=k;i++)f+=Math.log(i);return clamp(Math.exp(k*Math.log(l)-l-f),0,1)},
  cdf(n,l){let s=0;for(let i=0;i<=n;i++)s+=this.pmf(i,l);return clamp(s,0,1)},
  ccdf(n,l){return clamp(1-this.cdf(n,l),0,1)},
  jp(h,a,lH,lA){return this.pmf(h,lH)*this.pmf(a,lA)},
  pHW(lH,lA){let p=0;for(let h=1;h<=8;h++)for(let a=0;a<h;a++)p+=this.jp(h,a,lH,lA);return clamp(p,0,1)},
  pDr(lH,lA){let p=0;for(let g=0;g<=8;g++)p+=this.jp(g,g,lH,lA);return clamp(p,0,1)},
  pAW(lH,lA){let p=0;for(let a=1;a<=8;a++)for(let h=0;h<a;h++)p+=this.jp(h,a,lH,lA);return clamp(p,0,1)},
  pBt(lH,lA){return(1-this.pmf(0,lH))*(1-this.pmf(0,lA))},
  lam(hA,hD,aA,aD,adv){return{h:clamp(hA*aD*(adv||1.1),.2,5),a:clamp(aA*hD,.1,5)}}
};

// ═══════════════════════════════════════════════════════════
// §6  CATEGORY FILTERS  (preserved unchanged)
// ═══════════════════════════════════════════════════════════
const CF={
  PRIME_SAFE:{ids:new Set(["HOME_WIN","AWAY_WIN","HOME_WIN_OR_DRAW","AWAY_WIN_OR_DRAW"]),min:48,n:2,v:0},
  DAILY_5PLUS:{ids:new Set(["HOME_WIN","AWAY_WIN","HOME_WIN_OR_DRAW","AWAY_WIN_OR_DRAW","OVER_1.5","OVER_2.5","UNDER_3.5"]),min:50,n:3,v:0},
  DAILY_10PLUS:{ids:new Set(["HOME_WIN","AWAY_WIN","HOME_WIN_OR_DRAW","AWAY_WIN_OR_DRAW","OVER_1.5","UNDER_3.5"]),min:48,n:4,v:0},
  OVER_UNDER:{ids:new Set(["OVER_1.5","UNDER_2.5","UNDER_3.5","UNDER_4.5"]),min:50,n:2,v:0},
  DOUBLE_TIPS:{ids:new Set(["HOME_WIN_BTTS","AWAY_WIN_BTTS","HOME_WIN_OR_DRAW","AWAY_WIN_OR_DRAW"]),min:48,n:2,v:0},
  SINGLE_GAME:{ids:new Set(["HOME_WIN","AWAY_WIN","HOME_WIN_OR_DRAW","AWAY_WIN_OR_DRAW"]),min:50,n:1,v:0},
  DAILY_2_2_5:{ids:new Set(["HOME_WIN_OR_DRAW","AWAY_WIN_OR_DRAW","UNDER_2.5","UNDER_3.5"]),min:50,n:5,v:0},
  ELITE_VIP:{ids:new Set(["HOME_WIN_OR_DRAW","AWAY_WIN_OR_DRAW","HOME_OVER_0.5","AWAY_OVER_0.5","OVER_1.5","UNDER_3.5","UNDER_4.5"]),min:58,n:5,v:1},
  CORRECT_SCORE:{ids:new Set(["EXACT_1_1","EXACT_2_1_HOME","EXACT_3_1_HOME","EXACT_0_1_AWAY","EXACT_0_2_AWAY","EXACT_0_3_AWAY"]),min:10,n:6,v:1},
  HT_FT_VIP:{ids:new Set(["HT_FT_HOME_HOME","HT_FT_DRAW_HOME","HT_FT_AWAY_AWAY","HT_FT_DRAW_AWAY"]),min:10,n:6,v:1},

  SINGLE_VIP:{ids:new Set(["HOME_OVER_0.5","AWAY_OVER_0.5","UNDER_4.5"]),min:60,n:1,v:1},
  OVER_UNDER_VIP:{ids:new Set(["OVER_2.5","OVER_3.5","UNDER_3.5","UNDER_4.5","OVER_1.5"]),min:45,n:6,v:1},
  HIGH_VALUE_1:{ids:new Set(["HOME_WIN_OR_DRAW","AWAY_WIN_OR_DRAW","OVER_1.5","UNDER_3.5","UNDER_4.5","HOME_OVER_0.5","AWAY_OVER_0.5","OVER_0.5"]),min:70,n:6,v:0},

};

const PE = {

// ─── Fix B: H2H reliability curve ───
rel(n){return [0,.15,.3,.45,.55,.65,.72,.79,.85,.93,1][clamp(n,0,10)]},

// ─── Fix G: H2H metrics with isBaserate ───
calcH2H(data){
  // Audit: try all known wrapper structures
  const ms = data?.response?.matches || data?.matches || data?.data || [];
  if(!ms.length) return {n:0,hW:0,aW:0,dr:0,avg:2.7,hAvg:1.51,aAvg:1.19,bt:0,
    o15:0,o25:0,o35:0,hS:0,aS:0,hC:0,aC:0,base:true};
  let hW=0,aW=0,dr=0,tG=0,tH=0,tA=0,bt=0,o1=0,o2=0,o3=0,hs=0,as2=0,hcs=0,acs=0;
  for(const x of ms){
    // Audit: try every known score path
    const h = x.home?.score ?? x.homeScore ?? x.goals?.home ?? x.score?.home ??
              x.home?.goals ?? x.teams?.home?.score ?? 0;
    const a = x.away?.score ?? x.awayScore ?? x.goals?.away ?? x.score?.away ??
              x.away?.goals ?? x.teams?.away?.score ?? 0;
    const t=h+a; tG+=t; tH+=h; tA+=a;
    h>a?hW++:a>h?aW++:dr++;
    if(t>=2)o1++; if(t>=3)o2++; if(t>=4)o3++;
    if(h>0&&a>0)bt++; if(h>0)hs++; if(a>0)as2++;
    if(a===0)hcs++; if(h===0)acs++;
  }
  const n=ms.length;
  return{n,hW,aW,dr,avg:tG/n,hAvg:tH/n,aAvg:tA/n,bt,o15:o1,o25:o2,o35:o3,
    hS:hs,aS:as2,hC:hcs,aC:acs,base:false};
},

// ─── Season context extractor (Fix audit) ───
extractCtx(det,isHome){
  // Try multiple wrapper structures
  const td = isHome
    ? (det?.stats?.response?.home || det?.response?.home || det?.stats?.home || det?.home)
    : (det?.stats?.response?.away || det?.response?.away || det?.stats?.away || det?.away);
  const s = td?.stats || td?.statistics || td; if(!s) return null;
  const w=isHome?s.homeWins??s.wins?.home:s.awayWins??s.wins?.away;
  const l=isHome?s.homeLosses??s.losses?.home:s.awayLosses??s.losses?.away;
  const d=isHome?s.homeDraws??s.draws?.home:s.awayDraws??s.draws?.away;
  const gs=isHome?s.homeGoalsScored??s.goals?.scored?.home:s.awayGoalsScored??s.goals?.scored?.away;
  const gc=isHome?s.homeGoalsConceded??s.goals?.conceded?.home:s.awayGoalsConceded??s.goals?.conceded?.away;
  const g=Math.max((w||0)+(l||0)+(d||0),1);
  const fm=td?.form||s?.form||'';
  const rW=fm.slice(-5).split('').filter(c=>c==='W').length;
  return{atk:clamp((gs||0)/g,.1,4),def:clamp((gc||0)/g,.1,4),
    wr:clamp((w||0)/g,0,1),form:fm,rW,ff:(rW-2)*.05};
},

// ─── Fix H: Implied odds with overround removal ───
extractImplied(det){
  const no={hW:.4,dr:.28,aW:.32,has:false};
  // Try every known odds wrapper path
  const o = det?.odds?.response?.odds || det?.odds?.odds || det?.odds?.response ||
            det?.response?.odds || det?.odds || null;
  if(!o||typeof o!=='object') return no;
  // Fix H: try ALL common key name variants
  let rH=o.home_win??o.homeWin??o.home??o.Home??o['1']??o.h??0;
  let rD=o.draw??o.Draw??o['X']??o.x??o.d??0;
  let rA=o.away_win??o.awayWin??o.away??o.Away??o['2']??o.a??0;
  if(rH<=1)rH=0; if(rD<=1)rD=0; if(rA<=1)rA=0;
  if(!rH&&!rD&&!rA) return no;
  const iH=rH>1?1/rH:0, iD=rD>1?1/rD:0, iA=rA>1?1/rA:0;
  const s=iH+iD+iA; if(s<=0) return no;
  // Fix H: remove overround by normalising
  return{hW:clamp(iH/s,.01,.98),dr:clamp(iD/s,.01,.98),aW:clamp(iA/s,.01,.98),has:true};
},

// ─── Fix C: Match lambdas with Dixon-Coles ───
computeLambdas(h,hC,aC,r){
  const bH=1.51,bA=1.19; let sH,sA;
  if(hC&&aC){const l=Po.lam(hC.atk,hC.def,aC.atk,aC.def,1.1);sH=l.h;sA=l.a}
  else{sH=bH;sA=bA}
  const hH=h.n>0?h.hAvg:bH, hA=h.n>0?h.aAvg:bA;
  const w=r*.4, sw=1-w;
  let bh=sH*sw+hH*w, ba=sA*sw+hA*w;
  if(hC)bh*=(1+hC.ff); if(aC)ba*=(1+aC.ff);
  return{h:clamp(bh,.2,5),a:clamp(ba,.1,5),get t(){return this.h+this.a}};
},

// ─── Fix I: Confidence blending formula ───
blend(h2hSig,poisSig,rel,impliedProb,homeAdv,seedN,lo,hi){
  const blended = h2hSig*rel + poisSig*(1-rel);
  const oddsAdj = impliedProb!=null ? blended*.60 + impliedProb*100*.40 : blended;
  return clamp(Math.round(oddsAdj + (homeAdv||0) + (seedN||0)), lo, hi);
},

// ─── Fix J: Analysis builders (punter-friendly English) ───
anHomeWin(m,pHW,ip){
  const t=m.n;
  if(ip.has&&ip.hW>.55&&!m.base) return "Home side are strong favourites here — their recent record in this fixture and the market both point towards a home win.";
  if(!m.base&&t>=5&&m.hW/t>=.5) return `Home side win ${m.hW} of the last ${t} meetings — a dominant home record that's hard to ignore.`;
  if(!m.base&&t>=3) return "Home advantage and a solid recent record against this opponent make a home win the most likely outcome.";
  if(pHW>=.50) return "Home side are strong at home this season and in good recent form — the form book strongly suggests a home win here.";
  if(pHW>=.35) return "Home advantage and squad quality give the hosts a clear edge — expect them to use the crowd to push for three points.";
  return "This is an evenly contested fixture but home advantage could be the deciding factor in a tight game.";
},
anAwayWin(m,pAW,ip){
  const t=m.n;
  if(ip.has&&ip.aW>.50) return "The market rates the away side highly and their form away from home backs that up — this looks like a good spot for an away win.";
  if(!m.base&&t>=5&&m.aW/t>=.4) return `Away side win ${m.aW} of the last ${t} meetings — they have consistently performed well in this fixture.`;
  if(!m.base&&t>=3) return "Away side have shown they can come to this ground and perform — they carry enough quality to take something here.";

  return "An away win is not the most likely outcome but the visitors have enough going for them to make it possible.";
},
anDraw(m,pDr){

  if(!m.base&&m.dr>=2) return "A tight H2H record with plenty of draws suggests neither side finds it easy to beat the other.";
  if(pDr>=.28) return "Evenly matched sides where neither has a clear edge — a share of the spoils looks a fair outcome.";

anOver15(m,L){

anBtts(m,L){

anCS(hg,ag){

winReason(wins,tot,side,isBase){
  if(isBase) return `${side.charAt(0).toUpperCase()+side.slice(1)} side win in roughly ${side==='home'?'45%':'32%'} of matches at this level`;

// MAIN GENERATOR — generates ALL predictions for one match

gen(match,det){
  const P=[];
  const sd=hc(match.id||'')^(hc(match.home?.name||'')*31)^(hc(match.away?.name||'')*17)^(hc(match.time||'')*7);

  const lT=L.t;

  const pO15=Po.ccdf(1,lT), hO15=m.base?.74:m.o15/t;

  const pHS=1-Po.pmf(0,L.h), pAS=1-Po.pmf(0,L.a);

  const pHCS=Po.pmf(0,L.a), hHCS=m.base?.32:m.hC/t;

  const pBt2=Po.pBt(L.h,L.a), pO252=Po.ccdf(2,lT);

  P.push(mk("AWAY_WIN_OVER_2.5","Away Win & Over 2.5 Goals",
    this.blend(hAW2*hO252*100,pAW*pO252*100,rel,ip.has?ip.aW*.6:null,0,noise(sd,"AW_O25",5),24,70),

  let pW1=0;for(let a=0;a<=8;a++)pW1+=Po.jp(a+1,a,L.h,L.a);
  P.push(mk("HOME_WIN_BY_1","Home Win by 1 Goal",

  let pA2=0;for(let hh=0;hh<=6;hh++)for(let a=hh+2;a<=8;a++)pA2+=Po.jp(hh,a,L.h,L.a);
  P.push(mk("AWAY_WIN_BY_2_PLUS","Away Win by 2+ Goals",

     !m.base&&m.aAvg>=1.8?"Away side score well in H2H games":""]));

  // ═══ SECTION 14: MEDIUM MARKETS (complete) ═══
  const htL2=L.h*.45+L.a*.45, shL=L.h*.55+L.a*.55;

  P.push(mk("FIRST_HALF_OVER_0.5","First Half Over 0.5 Goals",

  P.push(mk("GOAL_RANGE_0_1","Total Goals 0-1",

  P.push(mk("GOAL_RANGE_4_PLUS","Total Goals 4+",

  P.push(mk("OVER_3.5_CARDS","Over 3.5 Cards",

  // ═══ SECTION 15: LOW CONFIDENCE / TIMING MARKETS (complete) ═══
  const lo=(id,nm,b,rng,lo2,hi2,an,re)=>mk(id,nm,clamp(b+noise(sd,id,rng),lo2,hi2),an,re);

  P.push(lo("EARLY_GOAL_0_15","Goal in First 15 Minutes",45,8,32,55,

  P.push(lo("LATE_GOAL_75_PLUS","Goal After 75 Minutes",48,6,38,58,

  P.push(lo("HOME_SCORE_FIRST","Home Team Scores First",52,6,42,62,

    ["Home crowd lifts the team in the opening exchanges","Home advantage is real in the early stages"]));
  P.push(lo("AWAY_SCORE_FIRST","Away Team Scores First",46,6,36,56,
    "Away team catch the home side cold and strike first — counter-attacking sides love this approach.",
    ["Away teams often sit deep and catch the home side on the break"]));
  P.push(lo("GOAL_BOTH_HALVES","Goal in Both Halves",50,6,40,62,
    "Goals spread across both halves — suggests an open, flowing game rather than a dead-rubber.",
    ["Consistently goal-active sides score in both halves"]));
  P.push(lo("COMEBACK_POSSIBLE","Comeback Win Possible",42,8,30,52,
    "A team coming from behind to win — rare but the strongest indicator of squad depth.",
    ["Strong squad depth can turn games around","Don't write off this team at half-time"]));
  P.push(lo("PENALTY_AWARDED","Penalty Awarded",38,8,28,50,
    "A penalty kick awarded in this match — attacking play in the box increases the probability.",
    ["Both sides attack in dangerous areas","Penalties occur in roughly a third of top-level matches"]));
  P.push(lo("RED_CARD","Red Card Shown",32,8,22,44,

    ["Physical match expected","Referee likely to clamp down on rough challenges"]));
  P.push(lo("HIGH_TEMPO_MATCH","High Tempo Match",46,7,36,58,
    "A fast-paced, end-to-end encounter — both sides like to press high and play with intensity.",
    ["Both teams favour an attacking, high-press style"]));
  P.push(lo("DEFENSIVE_BATTLE","Defensive Battle",42,8,30,52,
    "Both sides defend deep and make it difficult — the game is settled by the finest of margins.",
    ["Risk-averse approach from one or both sides","Neither team wants to open up and get punished"]));
  P.push(lo("MANY_SHOTS","Over 20 Total Shots",48,7,38,60,
    "More than 20 shots between both teams — an attacking match with both sides looking to create.",
    ["High-tempo attacking game expected from both sides"]));
  P.push(lo("SUBSTITUTION_IMPACT","Substitute Makes Impact",42,8,30,54,
    "A substitution directly changes the game — common when managers gamble for the winning goal.",
    ["Bench depth and tactical changes often decide tight games"]));

  return P;
},

// ═══ FILTER FOR CATEGORY (signature preserved) ═══
filter(cat,pool,dMap){
  const f=CF[cat]; if(!f) return [];
  const used=new Set();
  const cands=pool.map(m2=>{
    const ps=this.gen(m2,dMap[m2.id])
      .filter(p=>f.ids.has(p.id)&&p.confidence>=f.min)
      .sort((a,b)=>b.confidence-a.confidence);
    return ps.length?{match:m2,ranked:ps.map(p=>({...p,matchItem:m2}))}:null;
  }).filter(Boolean).sort((a,b)=>b.ranked[0].confidence-a.ranked[0].confidence);
  const res=[];
  for(const mc of cands){
    if(res.length>=f.n)break;
    const ch=mc.ranked.find(p=>!used.has(p.id))||mc.ranked[0];
    res.push(ch); used.add(ch.id);
  }
  return res;
}
}; // end PE

// ═══════════════════════════════════════════════════════════
// §8  UI
// ═══════════════════════════════════════════════════════════
function dispDate(d){
  const today=new Date();today.setHours(0,0,0,0);const c=new Date(d);c.setHours(0,0,0,0);
  const diff=Math.round((c-today)/864e5);
  const lbl=diff===0?'Today':diff===1?'Tomorrow':diff===-1?'Yesterday':d.toLocaleDateString('en',{weekday:'long'});
  document.getElementById('dDay').textContent=lbl;
  document.getElementById('dFull').textContent=d.toLocaleDateString('en',{day:'numeric',month:'long',year:'numeric'});
}
function chgDate(off){curDate.setDate(curDate.getDate()+off);dispDate(curDate);load()}
function buildTabs(){
  const el=document.getElementById('tabs');el.innerHTML='';
  for(const[k,f]of Object.entries(CF)){
    const b=document.createElement('button');
    b.className='cb'+(k===curCat?' a':'');
    b.innerHTML=(CL[k]||k)+(f.v?' <span class="vb">VIP</span>':'');
    b.onclick=()=>{curCat=k;document.querySelectorAll('.cb').forEach(x=>x.classList.remove('a'));b.classList.add('a');render()};
    el.appendChild(b);
  }
}
function showMeta(meta){
  const el=document.getElementById('metaBar');
  if(!meta){el.style.display='none';return}
  el.style.display='flex';
  el.innerHTML=`<div class="mi">⚽ <b>${meta.totalMatches||0}</b> matches</div><div class="mi">📊 <b>${meta.statsLoaded||0}</b> with stats</div><div class="mi">🔋 <b>${meta.readiness||0}%</b> ready</div>`;
}
async function load(force=false){
  const main=document.getElementById('main');
  main.innerHTML='<div class="ld"><div class="sp"></div><p>Loading predictions…</p></div>';
  showMeta(null);
  bundle=await loadBundle(curDate,force);
  predC={};
  if(!bundle||!bundle.matches.length){main.innerHTML='<div class="em"><div class="ic">📡</div><p>No data available for this date.<br>Check your connection and try again.</p><button onclick="load(true)">Retry</button></div>';return}
  showMeta(bundle.meta);updStatus();render();
}
function render(){
  const main=document.getElementById('main');
  if(!bundle||!bundle.matches.length){main.innerHTML='<div class="em"><div class="ic">⚽</div><p>No matches found.</p></div>';return}
  const f=CF[curCat],ds=fmtD(curDate),ck=curCat+'_'+ds;
  if(!predC[ck]){const t0=performance.now();predC[ck]=PE.filter(curCat,bundle.matches,bundle.details);LOG.info(`Predictions: ${predC[ck].length} in ${Math.round(performance.now()-t0)}ms`)}
  const preds=predC[ck];
  let html=`<div class="sh"><h2>⚡ ${CL[curCat]||curCat} ${f.v?'<span class="vb" style="font-size:10px">VIP</span>':''}</h2><span class="cnt">${preds.length} tip${preds.length!==1?'s':''}</span></div>`;
  if(!preds.length){html+='<div class="em"><div class="ic">🔍</div><p>No predictions meet criteria for this category today.</p></div>';main.innerHTML=html;return}
  for(let i=0;i<preds.length;i++){
    const pr=preds[i],mx=pr.matchItem||{};
    const home=mx.home?.name||mx.homeTeam?.name||mx.teams?.home?.name||'Home';
    const away=mx.away?.name||mx.awayTeam?.name||mx.teams?.away?.name||'Away';
    const time=mx.time||mx.fixture?.time||mx.kickoff||'';
    const league=mx.league?.name||mx.competition?.name||'';
    const country=mx.league?.country||mx.competition?.country||'';
    const cc=pr.confidence>=65?'ch':pr.confidence>=45?'cm':'cl';
    const uid='p'+i+'_'+Math.abs(hc(pr.id+(mx.id||'')));
    html+=`<div class="mc"><div class="mh"><span class="ml">${country?country+' · ':''}${league}</span><span class="mt2">🕐 ${time}</span></div>
    <div class="ms"><div class="tm"><div class="ti">${(home[0]||'?').toUpperCase()}</div><div class="tn">${home}</div></div><div class="vs">VS</div><div class="tm aw"><div class="tn">${away}</div><div class="ti">${(away[0]||'?').toUpperCase()}</div></div></div>
    <div class="pa"><div class="pr ${cc}" onclick="tog('${uid}')"><div class="pl"><div class="pn">🎯 ${pr.name}</div><div class="pt">${pr.id.replace(/_/g,' ')}</div></div><div class="cw2"><div class="cfb"><div class="cff" style="width:${pr.confidence}%"></div></div><div class="cn">${pr.confidence}%</div></div></div>
    <div class="pd" id="${uid}"><div class="pan">📊 ${pr.analysis||''}</div><ul class="pre">${(pr.reasons||[]).map(r=>'<li>'+r+'</li>').join('')}</ul></div></div></div>`;
  }
  html+=`<div class="ci">⚡ Predictions generated offline • ${new Date().toLocaleTimeString()}</div>`;
  main.innerHTML=html;
}
function tog(id){const e=document.getElementById(id);if(e)e.classList.toggle('open')}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
function updStatus(){const d=document.getElementById('sDot'),t=document.getElementById('sTxt');if(navigator.onLine){d.className='dot on';t.textContent='Online'}else{d.className='dot off';t.textContent='Offline'}}
async function doRefresh(){
  document.getElementById('rBtn').classList.add('spin');
  Cache.reset();predC={};
  try{await fetch(`${API}/sync-fixtures`,{signal:AbortSignal.timeout(10000)});LOG.net('sync-fixtures ok')}catch(e){LOG.info('sync skip:'+e.message)}
  await load(true);
  document.getElementById('rBtn').classList.remove('spin');
  toast('🔄 Data refreshed');
}

// ═══════════════════════════════════════════════════════════
window.addEventListener('online',updStatus);window.addEventListener('offline',updStatus);
(async()=>{
  await Cache.init();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
  dispDate(curDate);buildTabs();updStatus();load();
})();
