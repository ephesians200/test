    <h1>Predict<span>Pro</span></h1>
  </div>

<script>
/* ═══════════════════════════════════════════════════════════
   §1  CONFIGURATION
   ═══════════════════════════════════════════════════════════ */
const API='https://football-ai-backend.ephesians2004.workers.dev';
const DB_NAME='predictpro_db';
const DB_VER=1;
const TTL={FIX:24*36e5,DET:24*36e5,ODDS:2*36e5,PAST:7*24*36e5};
let curDate=new Date(),curCat='DAILY_5PLUS',bundle=null,predC={};
const MEM={bundles:new Map(),details:new Map(),preds:new Map()};
const INFLIGHT=new Map();
let lastPrefetchDate=null;

/* ═══════════════════════════════════════════════════════════
   §2  LOGGING
   ═══════════════════════════════════════════════════════════ */
const LOG={
  _el:null,
  _get(){return this._el||(this._el=document.getElementById('logBar'))},
  log(tag,msg){const s=`[${tag}] ${msg}`;console.log(s);const e=this._get();if(e)e.textContent=s},
  mem(m){this.log('MEM HIT',m)},disk(m){this.log('CACHE HIT',m)},
  net(m){this.log('NETWORK',m)},stale(m){this.log('STALE FALLBACK',m)},
  bundle(m){this.log('BUNDLE',m)},info(m){this.log('INFO',m)}
};

/* ═══════════════════════════════════════════════════════════
   §3  3-LAYER CACHE MANAGER
   Layer 1 — In-memory Map (zero I/O)
   Layer 2 — IndexedDB (survives reload)
   Layer 3 — Network (last resort)
   ═══════════════════════════════════════════════════════════ */
const Cache={
  db:null,

  async init(){
    return new Promise((ok,fail)=>{
      const r=indexedDB.open(DB_NAME,DB_VER);
      r.onupgradeneeded=e=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains('kv'))db.createObjectStore('kv');
      };
      r.onsuccess=e=>{Cache.db=e.target.result;ok()};
      r.onerror=()=>{LOG.info('IndexedDB unavailable');ok()};
    });
  },

  /* ── Layer 1: Memory ── */
  memGet(key){
    const e=MEM.bundles.get(key)||MEM.details.get(key);
    if(!e)return null;
    if(Date.now()-e.ts>e.ttl){MEM.bundles.delete(key);MEM.details.delete(key);return null}
    return e.data;
  },
  memSet(key,data,ttl,store='bundles'){
    MEM[store].set(key,{data,ts:Date.now(),ttl});
  },

  /* ── Layer 2: IndexedDB ── */
  async diskGet(key){
    if(!this.db)return null;
    return new Promise(ok=>{
      try{
        const tx=this.db.transaction('kv','readonly');
        const rq=tx.objectStore('kv').get(key);
        rq.onsuccess=()=>{
          const e=rq.result;
          if(!e)return ok(null);
          if(Date.now()-e.ts>e.ttl)return ok(null);// expired
          ok(e.data);
        };
        rq.onerror=()=>ok(null);
      }catch(e){ok(null)}
    });
  },
  async diskSet(key,data,ttl){
    if(!this.db)return;
    try{
      const tx=this.db.transaction('kv','readwrite');
      tx.objectStore('kv').put({data,ts:Date.now(),ttl},key);
    }catch(e){}
  },
  async diskGetStale(key){
    if(!this.db)return null;
    return new Promise(ok=>{
      try{
        const tx=this.db.transaction('kv','readonly');
        const rq=tx.objectStore('kv').get(key);
        rq.onsuccess=()=>{const e=rq.result;ok(e?e.data:null)};
        rq.onerror=()=>ok(null);
      }catch(e){ok(null)}
    });
  },

  /* ── Layer 3: Network (deduped) ── */
  async netFetch(url){
    if(INFLIGHT.has(url)){LOG.info('Deduped: '+url.split('/').pop());return INFLIGHT.get(url)}
    const p=fetch(url,{signal:AbortSignal.timeout(20000)}).then(r=>{
      if(!r.ok)throw new Error(r.status);return r.json();
    }).finally(()=>INFLIGHT.delete(url));
    INFLIGHT.set(url,p);
    return p;
  },

  /* ── Unified getter: mem → disk → network → stale ── */
  async get(key,ttl,fetchUrl){
    // 1. Memory
    const m=this.memGet(key);
    if(m){LOG.mem(key);return m}

    // 2. IndexedDB
    const d=await this.diskGet(key);
    if(d){LOG.disk(key);this.memSet(key,d,ttl);return d}

    // 3. Network
    if(fetchUrl){
      try{
        const n=await this.netFetch(fetchUrl);
        LOG.net(key);
        this.memSet(key,n,ttl);
        await this.diskSet(key,n,ttl);
        return n;
      }catch(e){
        LOG.stale(key+' (net failed: '+e.message+')');
      }
    }

    // 4. Stale fallback
    const s=await this.diskGetStale(key);
    if(s){LOG.stale(key);this.memSet(key,s,ttl);return s}
    return null;
  },

  /* ── Reset all guards ── */
  reset(){
    MEM.bundles.clear();MEM.details.clear();MEM.preds.clear();
    lastPrefetchDate=null;predC={};
    LOG.info('All caches & guards reset');
  }
};

/* ═══════════════════════════════════════════════════════════
   §4  DATA MANAGER — Bundle parsing
   ═══════════════════════════════════════════════════════════ */
function fmtD(d){return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')}
function isPast(d){const t=new Date();t.setHours(0,0,0,0);const c=new Date(d);c.setHours(0,0,0,0);return c<t}
function bundleTTL(d){return isPast(d)?TTL.PAST:TTL.FIX}

function parseBundle(raw){
  if(!raw)return null;
  // Handle both top-level and nested response structures
  const status=raw.status||'success';
  if(status==='error')return null;

  let matches=raw.response?.matches||raw.matches||raw.data?.matches||raw.data?.fixtures||raw.fixtures||[];
  if(!Array.isArray(matches))matches=[];

  // Build details map from embedded data
  const details={};
  for(const m of matches){
    const id=m.id||m.fixture?.id||(''+Math.random());
    m.id=id;

    // Extract H2H — try multiple paths
    const h2h=m.cachedH2H||m.h2h||m.head2head||null;

    // Extract stats — try multiple paths
    const stats=m.cachedStats||m.stats||m.teamStats||null;

    // Extract odds — try multiple paths
    const odds=m.cachedOdds||m.odds||(stats?.odds?{response:{odds:stats.odds}}:null)||
               (stats?.response?.odds?{response:{odds:stats.response.odds}}:null)||null;

    details[id]={h2h,stats,odds};
  }

  const meta=raw.meta||{totalMatches:matches.length,statsLoaded:Object.keys(details).length,readiness:100};
  LOG.bundle(`PARSED: ${matches.length} matches, ${meta.statsLoaded||0} with stats, readiness ${meta.readiness||100}%`);
  return{matches,details,meta,status};
}

async function loadBundle(date,force){
  const ds=fmtD(date);
  const key='bundle:'+ds;
  const ttl=bundleTTL(date);

  // Prefetch guard
  if(!force&&lastPrefetchDate===ds){
    const m=Cache.memGet(key);
    if(m){LOG.mem('prefetch guard: '+ds);return parseBundle(m)}
  }

  const url=`${API}/v2/bundle?date=${ds}`;
  const raw=await Cache.get(key,ttl,force?null:url);

  // If force refresh, always hit network
  if(force){
    try{
      const fresh=await Cache.netFetch(url);
      LOG.net('forced refresh: '+ds);
      Cache.memSet(key,fresh,ttl);
      await Cache.diskSet(key,fresh,ttl);
      lastPrefetchDate=ds;
      return parseBundle(fresh);
    }catch(e){
      LOG.stale('force refresh failed, using cache');
      if(raw){lastPrefetchDate=ds;return parseBundle(raw)}
    }
  }

  lastPrefetchDate=ds;
  return parseBundle(raw);
}

/* ═══════════════════════════════════════════════════════════
   §5  POISSON ENGINE
   ═══════════════════════════════════════════════════════════ */
function clamp(v,lo,hi){return Math.min(Math.max(v,lo),hi)}
function hc(s){let h=0;for(let i=0;i<(s||'').length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return h}
function sRand(seed){let s=seed|0;return()=>{s=(s*1664525+1013904223)|0;return(s>>>0)/4294967296}}
function noise(seed,id,range){const r=sRand((seed+hc(id))^0xDEADBEEF);return Math.floor(r()*(range*2+1))-range}

const Po={
  pmf(k,l){if(l<=0)return k===0?1:0;if(k<0)return 0;let f=0;for(let i=2;i<=k;i++)f+=Math.log(i);return clamp(Math.exp(k*Math.log(l)-l-f),0,1)},
  cdf(n,l){let s=0;for(let i=0;i<=n;i++)s+=this.pmf(i,l);return clamp(s,0,1)},
  ccdf(n,l){return clamp(1-this.cdf(n,l),0,1)},
  jp(h,a,lH,lA){return this.pmf(h,lH)*this.pmf(a,lA)},
  pHW(lH,lA){let p=0;for(let h=1;h<=8;h++)for(let a=0;a<h;a++)p+=this.jp(h,a,lH,lA);return clamp(p,0,1)},
  pDr(lH,lA){let p=0;for(let g=0;g<=8;g++)p+=this.jp(g,g,lH,lA);return clamp(p,0,1)},
  pAW(lH,lA){let p=0;for(let a=1;a<=8;a++)for(let h=0;h<a;h++)p+=this.jp(h,a,lH,lA);return clamp(p,0,1)},
  pBt(lH,lA){return(1-this.pmf(0,lH))*(1-this.pmf(0,lA))},
  lam(hA,hD,aA,aD,adv){return{h:clamp(hA*aD*(adv||1.1),.2,5),a:clamp(aA*hD,.1,5)}}
};

/* ═══════════════════════════════════════════════════════════
   §6  CATEGORY FILTERS
   ═══════════════════════════════════════════════════════════ */
const CF={
  PRIME_SAFE:{ids:new Set(["HOME_WIN","AWAY_WIN","HOME_WIN_OR_DRAW","AWAY_WIN_OR_DRAW"]),min:48,n:2,v:0},
  DAILY_5PLUS:{ids:new Set(["HOME_WIN","AWAY_WIN","HOME_WIN_OR_DRAW","AWAY_WIN_OR_DRAW","OVER_1.5","OVER_2.5","UNDER_3.5"]),min:50,n:3,v:0},
  DAILY_10PLUS:{ids:new Set(["HOME_WIN","AWAY_WIN","HOME_WIN_OR_DRAW","AWAY_WIN_OR_DRAW","OVER_1.5","UNDER_3.5"]),min:48,n:4,v:0},
  OVER_UNDER:{ids:new Set(["OVER_1.5","UNDER_2.5","UNDER_3.5","UNDER_4.5"]),min:50,n:2,v:0},
  DOUBLE_TIPS:{ids:new Set(["HOME_WIN_BTTS","AWAY_WIN_BTTS","HOME_WIN_OR_DRAW","AWAY_WIN_OR_DRAW"]),min:48,n:2,v:0},
  SINGLE_GAME:{ids:new Set(["HOME_WIN","AWAY_WIN","HOME_WIN_OR_DRAW","AWAY_WIN_OR_DRAW"]),min:50,n:1,v:0},
  DAILY_2_2_5:{ids:new Set(["HOME_WIN_OR_DRAW","AWAY_WIN_OR_DRAW","UNDER_2.5","UNDER_3.5"]),min:50,n:5,v:0},
  ELITE_VIP:{ids:new Set(["HOME_WIN_OR_DRAW","AWAY_WIN_OR_DRAW","HOME_OVER_0.5","AWAY_OVER_0.5","OVER_1.5","UNDER_3.5","UNDER_4.5"]),min:58,n:5,v:1},

const PE={
  /* ── reliability curve ── */
  rel(n){return[0,.15,.3,.45,.55,.65,.72,.79,.85,.93,1][Math.min(Math.max(n,0),10)]},

  /* ── H2H metrics ── */
  h2h(data){
    const ms=data?.response?.matches||data?.matches||[];
    if(!ms.length)return{n:0,hW:0,aW:0,dr:0,avg:2.7,hAvg:1.51,aAvg:1.19,bt:0,o15:0,o25:0,o35:0,hS:0,aS:0,hC:0,aC:0,base:true};
    let hW=0,aW=0,dr=0,tG=0,tH=0,tA=0,bt=0,o1=0,o2=0,o3=0,hs=0,as=0,hcs=0,acs=0;
    for(const x of ms){
      const h=x.home?.score??x.homeScore??x.goals?.home??0;
      const a=x.away?.score??x.awayScore??x.goals?.away??0;
      const t=h+a;tG+=t;tH+=h;tA+=a;
      h>a?hW++:a>h?aW++:dr++;
      if(t>=2)o1++;if(t>=3)o2++;if(t>=4)o3++;
      if(h>0&&a>0)bt++;if(h>0)hs++;if(a>0)as++;
      if(a===0)hcs++;if(h===0)acs++;

    const n=ms.length;
    return{n,hW,aW,dr,avg:tG/n,hAvg:tH/n,aAvg:tA/n,bt,o15:o1,o25:o2,o35:o3,hS:hs,aS:as,hC:hcs,aC:acs,base:false};
  },

  /* ── season context ── */
  ctx(det,isH){
    const td=isH?det?.stats?.response?.home||det?.response?.home:det?.stats?.response?.away||det?.response?.away;
    const s=td?.stats;if(!s)return null;
    const w=isH?s.homeWins:s.awayWins,l=isH?s.homeLosses:s.awayLosses,d=isH?s.homeDraws:s.awayDraws;
    const gs=isH?s.homeGoalsScored:s.awayGoalsScored,gc=isH?s.homeGoalsConceded:s.awayGoalsConceded;
    const g=Math.max((w||0)+(l||0)+(d||0),1),fm=td?.form||'';
    const rW=fm.slice(-5).split('').filter(c=>c==='W').length;
    return{atk:clamp((gs||0)/g,.1,4),def:clamp((gc||0)/g,.1,4),wr:clamp((w||0)/g,0,1),rW,ff:(rW-2)*.05};
  },

  /* ── implied odds ── */
  imp(det){
    const no={hW:.4,dr:.28,aW:.32,has:false};
    const o=det?.odds?.response?.odds||det?.odds?.odds||det?.response?.odds||det?.odds||null;
    if(!o||typeof o!=='object')return no;
    let rH=o.home_win??o.homeWin??o.home??o['1']??0;
    let rD=o.draw??o.Draw??o['X']??o.x??0;
    let rA=o.away_win??o.awayWin??o.away??o['2']??0;
    if(rH<=1)rH=0;if(rD<=1)rD=0;if(rA<=1)rA=0;
    if(!rH&&!rD&&!rA)return no;
    const iH=rH>1?1/rH:0,iD=rD>1?1/rD:0,iA=rA>1?1/rA:0,s=iH+iD+iA;
    if(s<=0)return no;
    return{hW:clamp(iH/s,.01,.98),dr:clamp(iD/s,.01,.98),aW:clamp(iA/s,.01,.98),has:true};
  },

  /* ── match lambdas ── */
  lam(h,hC,aC,r){
    const bH=1.51,bA=1.19;let sH,sA;
    if(hC&&aC){const l=Po.lam(hC.atk,hC.def,aC.atk,aC.def,1.1);sH=l.h;sA=l.a}else{sH=bH;sA=bA}

    P.push(mk("OVER_8.5_CORNERS","Over 8.5 Corners",clamp(62+noise(sd,"CRN",6),52,74),"Nine or more corners.",["High-tempo football"]));
    P.push(mk("OVER_3.5_CARDS","Over 3.5 Cards",clamp(55+noise(sd,"CRD",7),46,68),"Four or more cards — feisty encounter.",["Physical match expected"]));

    /* ── LOW CONFIDENCE ── */
    const lo=(id,nm,b,rng,l,hh,an,re)=>mk(id,nm,clamp(b+noise(sd,id,rng),l,hh),an,[re]);
    P.push(lo("EARLY_GOAL_0_15","Goal in First 15 Min",45,8,32,55,"A goal inside the first quarter.","Fast-starting forwards"));
    P.push(lo("LATE_GOAL_75_PLUS","Goal After 75 Min",48,6,38,58,"Late drama as teams chase the game.","Teams push forward late"));
    P.push(lo("HOME_SCORE_FIRST","Home Scores First",52,6,42,62,"Home side draw first blood.","Home advantage early"));
    P.push(lo("AWAY_SCORE_FIRST","Away Scores First",46,6,36,56,"Away catch the home side cold.","Counter-attacks"));
    P.push(lo("GOAL_BOTH_HALVES","Goal in Both Halves",50,6,40,62,"Goals across both halves.","Consistently goal-active sides"));
    return P;
  },

  /* ── Category filter ── */
  filter(cat,pool,dMap){
    const f=CF[cat];if(!f)return[];
    const used=new Set();
    const cands=pool.map(m=>{
      const ps=this.gen(m,dMap[m.id]).filter(p=>f.ids.has(p.id)&&p.confidence>=f.min).sort((a,b)=>b.confidence-a.confidence);
      return ps.length?{match:m,ranked:ps.map(p=>({...p,matchItem:m}))}:null;
    }).filter(Boolean).sort((a,b)=>b.ranked[0].confidence-a.ranked[0].confidence);
    const res=[];
    for(const mc of cands){
      if(res.length>=f.n)break;
      const ch=mc.ranked.find(p=>!used.has(p.id))||mc.ranked[0];
      res.push(ch);used.add(ch.id);
    }
    return res;
  }
};

/* ═══════════════════════════════════════════════════════════
   §8  UI
   ═══════════════════════════════════════════════════════════ */
function dispDate(d){
  const today=new Date();today.setHours(0,0,0,0);const c=new Date(d);c.setHours(0,0,0,0);
  const diff=Math.round((c-today)/864e5);
  const lbl=diff===0?'Today':diff===1?'Tomorrow':diff===-1?'Yesterday':d.toLocaleDateString('en',{weekday:'long'});
  document.getElementById('dDay').textContent=lbl;
  document.getElementById('dFull').textContent=d.toLocaleDateString('en',{day:'numeric',month:'long',year:'numeric'});
}
function chgDate(off){curDate.setDate(curDate.getDate()+off);dispDate(curDate);load()}

function buildTabs(){
  const el=document.getElementById('tabs');el.innerHTML='';
  for(const[k,f]of Object.entries(CF)){
    const b=document.createElement('button');
    b.className='cb'+(k===curCat?' a':'');
    b.innerHTML=(CL[k]||k)+(f.v?' <span class="vb">VIP</span>':'');
    b.onclick=()=>{curCat=k;document.querySelectorAll('.cb').forEach(x=>x.classList.remove('a'));b.classList.add('a');render()};
    el.appendChild(b);
  }
}

function showMeta(meta){
  const el=document.getElementById('metaBar');
  if(!meta){el.style.display='none';return}
  el.style.display='flex';
  el.innerHTML=`<div class="mi">⚽ <b>${meta.totalMatches||0}</b> matches</div>
    <div class="mi">📊 <b>${meta.statsLoaded||0}</b> with stats</div>
    <div class="mi">🔋 <b>${meta.readiness||0}%</b> ready</div>`;
}

async function load(force=false){
  const main=document.getElementById('main');
  main.innerHTML='<div class="ld"><div class="sp"></div><p>Loading predictions…</p></div>';
  showMeta(null);

  bundle=await loadBundle(curDate,force);

  if(!bundle||!bundle.matches.length){
    main.innerHTML='<div class="em"><div class="ic">📡</div><p>No data available for this date.<br>Check your connection and try again.</p><button onclick="load(true)">Retry</button></div>';
    return;
  }
  showMeta(bundle.meta);
  updStatus();render();
}

function render(){
  const main=document.getElementById('main');
  if(!bundle||!bundle.matches.length){main.innerHTML='<div class="em"><div class="ic">⚽</div><p>No matches found.</p></div>';return}

  const f=CF[curCat],ds=fmtD(curDate),ck=curCat+'_'+ds;

  // Use prediction cache (per-category per-date)
  if(!predC[ck]){
    const t0=performance.now();
    predC[ck]=PE.filter(curCat,bundle.matches,bundle.details);
    LOG.info(`Predictions generated in ${Math.round(performance.now()-t0)}ms`);
  }
  const preds=predC[ck];

  let html=`<div class="sh"><h2>⚡ ${CL[curCat]||curCat} ${f.v?'<span class="vb" style="font-size:10px">VIP</span>':''}</h2><span class="cnt">${preds.length} tip${preds.length!==1?'s':''}</span></div>`;
  if(!preds.length){html+='<div class="em"><div class="ic">🔍</div><p>No predictions meet criteria for this category today.</p></div>';main.innerHTML=html;return}

  for(let i=0;i<preds.length;i++){
    const pr=preds[i],m=pr.matchItem||{};
    const home=m.home?.name||m.homeTeam?.name||m.teams?.home?.name||'Home';
    const away=m.away?.name||m.awayTeam?.name||m.teams?.away?.name||'Away';
    const time=m.time||m.fixture?.time||m.kickoff||'';
    const league=m.league?.name||m.competition?.name||'';
    const country=m.league?.country||m.competition?.country||'';
    const cc=pr.confidence>=65?'ch':pr.confidence>=45?'cm':'cl';
    const uid='p'+i+'_'+Math.abs(hc(pr.id+(m.id||'')));

    html+=`<div class="mc">
      <div class="mh"><span class="ml">${country?country+' · ':''}${league}</span><span class="mt">🕐 ${time}</span></div>
      <div class="ms">
        <div class="tm"><div class="ti">${(home[0]||'?').toUpperCase()}</div><div class="tn">${home}</div></div>
        <div class="vs">VS</div>
        <div class="tm aw"><div class="tn">${away}</div><div class="ti">${(away[0]||'?').toUpperCase()}</div></div>
      </div>
      <div class="pa">
        <div class="pr ${cc}" onclick="tog('${uid}')">
          <div class="pl"><div class="pn">🎯 ${pr.name}</div><div class="pt">${pr.id.replace(/_/g,' ')}</div></div>
          <div class="cw2"><div class="cfb"><div class="cff" style="width:${pr.confidence}%"></div></div><div class="cn">${pr.confidence}%</div></div>
        </div>
        <div class="pd" id="${uid}">
          <div class="pan">📊 ${pr.analysis||''}</div>
          <ul class="pre">${(pr.reasons||[]).map(r=>'<li>'+r+'</li>').join('')}</ul>
        </div>
      </div>
    </div>`;
  }
  html+=`<div class="ci">⚡ Predictions generated offline • Cached ${new Date().toLocaleTimeString()}</div>`;
  main.innerHTML=html;
}

function tog(id){const e=document.getElementById(id);if(e)e.classList.toggle('open')}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
function updStatus(){const d=document.getElementById('sDot'),t=document.getElementById('sTxt');if(navigator.onLine){d.className='dot on';t.textContent='Online'}else{d.className='dot off';t.textContent='Offline'}}

async function doRefresh(){
  const btn=document.getElementById('rBtn');
  btn.classList.add('spin');
  Cache.reset();
  predC={};

  // Trigger sync-fixtures on the worker first
  try{
    await fetch(`${API}/sync-fixtures`,{signal:AbortSignal.timeout(10000)});
    LOG.net('sync-fixtures triggered');
  }catch(e){LOG.info('sync-fixtures skipped: '+e.message)}

  await load(true);
  btn.classList.remove('spin');
  toast('🔄 Data refreshed');
}

/* ═══════════════════════════════════════════════════════════
   §9  INIT
   ═══════════════════════════════════════════════════════════ */
window.addEventListener('online',updStatus);
window.addEventListener('offline',updStatus);

(async()=>{
  await Cache.init();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
  dispDate(curDate);
  buildTabs();
  updStatus();
  load();
})();
</script>
